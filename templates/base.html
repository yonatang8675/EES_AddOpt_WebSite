<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fair Budget Demo{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231f7a70'/%3E%3Cpath d='M8 16.5l5 5 11-12' fill='none' stroke='%23ffffff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-mark">FB</span>
      Fair Budget
    </a>
    <nav aria-label="Primary navigation">
      <a href="{{ url_for('index') }}">Build an election</a>
      <a href="{{ url_for('about') }}">How it works</a>
      <a href="https://arxiv.org/abs/2502.11797" rel="noreferrer" target="_blank">Research paper</a>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
    <footer class="sitefoot">
      <span>A friendly demo of the Method of Equal Shares.</span>
      <a href="{{ url_for('about') }}">How it works</a>
    </footer>
  </main>
</body>
</html>
